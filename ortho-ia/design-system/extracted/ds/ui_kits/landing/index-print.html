<!doctype html>
<html lang="fr" data-direction="A">
<head>
<meta charset="utf-8"/>
<title>Ortho.ia — La plume rapide des orthophonistes</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  body { margin: 0; }

  /* Open all FAQ items + carrousel cards for print */
  @media print {
    @page { size: A4 portrait; margin: 14mm; }

    html, body {
      background: var(--bg-canvas) !important;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    /* Force backgrounds + colors */
    *, *::before, *::after {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    /* Sticky header → static for print */
    header {
      position: static !important;
      backdrop-filter: none !important;
    }

    /* Avoid breaking sections awkwardly */
    section, footer {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    /* Each major section starts fresh on a new page when too big */
    section + section {
      break-before: auto;
    }

    /* Hide carousel nav buttons (◀ ▶ dots) — they don't make sense on paper */
    [aria-label="Story précédente"],
    [aria-label="Story suivante"],
    [aria-label^="Aller à la story"] {
      display: none !important;
    }

    /* Loosen FAQ collapsible — show all answers */
    details, .faq-item-print { break-inside: avoid; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Steps.jsx"></script>
<script type="text/babel" src="Ambassador.jsx"></script>
<script type="text/babel" src="Benefits.jsx"></script>
<script type="text/babel" src="Quote.jsx"></script>
<script type="text/babel" src="Pricing.jsx"></script>
<script type="text/babel" src="FAQ.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
  const App = () => (
    <div data-screen-label="Landing">
      <Header />
      <Hero />
      <Steps />
      <Ambassador />
      <Benefits />
      <Quote />
      <Pricing />
      <FAQ />
      <Footer />
    </div>
  );
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  // After mount: expand all FAQ <button> toggles so every Q&A prints.
  const expandAll = () => {
    // FAQItem renders a <button> with a "+" sign; click those whose state is collapsed.
    document.querySelectorAll('section button').forEach(btn => {
      const plus = btn.querySelector('span');
      if (plus && plus.textContent.trim() === '+' && plus.style.transform !== 'rotate(45deg)') {
        btn.click();
      }
    });
  };

  // Auto-print when ready
  const autoPrint = async () => {
    if (document.fonts && document.fonts.ready) {
      try { await document.fonts.ready; } catch (e) {}
    }
    expandAll();
    await new Promise(r => setTimeout(r, 600));
    window.print();
  };

  // Wait for React to finish first paint
  requestAnimationFrame(() => requestAnimationFrame(() => {
    setTimeout(autoPrint, 500);
  }));
</script>
</body>
</html>

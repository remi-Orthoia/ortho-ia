<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Ortho.ia — Capture HappyNeuron</title>
  <style>
    :root {
      --green: #2e7d32;
      --green-light: #c8e6c9;
      --red: #c62828;
      --red-light: #ffcdd2;
      --grey-50: #fafafa;
      --grey-100: #f5f5f5;
      --grey-300: #e0e0e0;
      --grey-700: #424242;
      --grey-900: #212121;
    }
    * { box-sizing: border-box; }
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: var(--grey-900);
      background: var(--grey-50);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .logo {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--green);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold;
      font-size: 16px;
    }
    h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }
    .agent-status {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 6px;
      margin-bottom: 12px;
      background: var(--grey-100);
      color: var(--grey-700);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .agent-status.ok { background: var(--green-light); color: var(--green); }
    .agent-status.ko { background: var(--red-light); color: var(--red); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
    button {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button.primary {
      background: var(--green);
      color: white;
    }
    button.primary:hover:not(:disabled) { background: #1b5e20; }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .secondary {
      margin-top: 8px;
      background: transparent;
      color: var(--grey-700);
      border: 1px solid var(--grey-300);
    }
    .secondary:hover:not(:disabled) { background: var(--grey-100); }
    .feedback {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    .feedback.success { background: var(--green-light); color: var(--green); display: block; }
    .feedback.error { background: var(--red-light); color: var(--red); display: block; }
    .token-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--grey-300);
      font-size: 12px;
      color: var(--grey-700);
    }
    .token-section input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--grey-300);
      border-radius: 4px;
      font-size: 12px;
      font-family: monospace;
      margin-top: 4px;
    }
    .token-section a { color: var(--green); text-decoration: none; }
    .footer {
      margin-top: 12px;
      font-size: 11px;
      color: var(--grey-700);
      text-align: center;
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">O</div>
    <h1>Ortho.ia</h1>
  </div>

  <div id="agent-status" class="agent-status">
    <span class="dot"></span>
    <span id="agent-status-text">Vérification de l'agent…</span>
  </div>

  <button id="capture-btn" class="primary" disabled>
    📸 Capturer HappyNeuron
  </button>

  <div id="feedback" class="feedback"></div>

  <details class="token-section">
    <summary>⚙️ Configuration</summary>
    <p style="margin: 8px 0 4px;">
      Collez votre clé d'accès Ortho.ia ci-dessous (visible dans
      <a id="token-link" href="#" target="_blank">votre profil</a>) :
    </p>
    <input id="token-input" type="password" placeholder="eyJhbGciOi…" />
    <button id="save-token" class="secondary">Enregistrer</button>
  </details>

  <div class="footer">v1.0 — agent local sur 127.0.0.1:7842</div>

  <script src="popup.js"></script>
</body>
</html>

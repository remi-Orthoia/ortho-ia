<!doctype html>
<html lang="fr" data-direction="A">
<head>
<meta charset="utf-8"/>
<title>Ortho.ia — App</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>html, body { margin:0; height: 100%; }</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="AppPrimitives.jsx"></script>
<script type="text/babel" src="AppShell.jsx"></script>
<script type="text/babel" src="Login.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="BilanForm.jsx"></script>
<script type="text/babel" src="ReportPreview.jsx"></script>

<script type="text/babel">
  const App = () => {
    const [screen, setScreen] = React.useState('dashboard'); // login | dashboard | bilan | report
    const [active, setActive] = React.useState('dashboard');

    if (screen === 'login') return <Login onLogin={() => setScreen('dashboard')}/>;

    let header, body;
    if (screen === 'dashboard') {
      header = <AppHeader title="Bonjour Julie" subtitle="Trois bilans vous attendent depuis hier."
                 right={<>
                   <IconButton title="Notifications">{I.bell}</IconButton>
                   <AppButton variant="primary" size="sm" icon={I.plus} onClick={() => setScreen('bilan')}>Nouveau bilan</AppButton>
                 </>}/>;
      body = <Dashboard onOpenBilan={() => setScreen('bilan')} onNew={() => setScreen('bilan')}/>;
    }
    if (screen === 'bilan') {
      header = <AppHeader title="Léa Martin · 7 ans" subtitle="Bilan langage écrit — brouillon"
                 right={<>
                   <AppButton variant="ghost" size="sm" onClick={() => setScreen('dashboard')}>← Retour</AppButton>
                   <AppButton variant="secondary" size="sm">Enregistrer</AppButton>
                 </>}/>;
      body = <BilanForm onGenerate={() => setScreen('report')}/>;
    }
    if (screen === 'report') {
      header = <AppHeader title="Aperçu du compte-rendu" subtitle="Léa Martin · 12 mars 2026"
                 right={<>
                   <AppButton variant="ghost" size="sm" onClick={() => setScreen('bilan')}>← Modifier</AppButton>
                   <AppButton variant="primary" size="sm" icon={I.download}>Télécharger .docx</AppButton>
                 </>}/>;
      body = <ReportPreview onBack={() => setScreen('bilan')}/>;
    }

    return (
      <AppShell active={active} onNav={(id) => { if (id === 'new-bilan') setScreen('bilan'); else { setActive(id); setScreen('dashboard'); } }} header={header}>
        {body}
      </AppShell>
    );
  };
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
